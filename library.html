<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compendium Library</title>

    <!-- Typewriter-style font -->
    <link href="https://fonts.googleapis.com/css2?family=Special+Elite&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Special Elite', monospace;
            background-color: #f4ecd8; /* parchment */
            color: #3b2f2f; /* ink */
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding-top: 60px;
        }

        .container {
            width: 80%;
            max-width: 700px;
            background: #faf5e6;
            border: 2px solid #c2b59b;
            padding: 40px;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
        }

        h1 {
            text-align: center;
            font-size: 2.5rem;
            margin-bottom: 20px;
            letter-spacing: 2px;
        }

        ul {
            list-style-type: none;
            padding: 0;
            margin-top: 20px;
        }

        li {
            margin: 12px 0;
            padding: 10px;
            border-bottom: 1px solid #c2b59b;
        }

        a {
            text-decoration: none;
            color: #3b2f2f;
            transition: 0.2s;
        }

        a:hover {
            color: #7a5f3e;
        }

        .back {
            display: inline-block;
            margin-top: 30px;
            padding: 8px 16px;
            border: 1px solid #3b2f2f;
            text-decoration: none;
            color: #3b2f2f;
        }

        .back:hover {
            background-color: #3b2f2f;
            color: #f4ecd8;
        }
    </style>
</head>
