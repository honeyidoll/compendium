<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta-name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compendium</title>

    <!-- Typewriter-style font -->
    <link href="https://fonts.googleapis.com/css2?family=Special+Elite&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Special Elite', monospace;
            background-color: #f4ecd8; /* warm parchment */
            color: #3b2f2f; /* deep brown ink */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }

        /* Page indentation wrapper */
        .page {
            max-width: 600px;
            padding: 0 40px; /* LEFT + RIGHT INDENT */
            box-sizing: border-box;
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 10px;
            letter-spacing: 2px;
        }

        a {
            display: inline-block;
            margin-top: 25px;
            padding: 10px 20px;
            border: 1px solid #3b2f2f;
            text-decoration: none;
            color: #3b2f2f;
            transition: 0.2s;
        }

        a:hover {
            background-color: #3b2f2f;
            color: #f4ecd8;
        }

        /* Honey Doll link styling */
        .small-link {
            font-size: 0.9rem;
            opacity: 0.9;
            color: #5e0f0f; /* deep dark red */
            text-decoration: none;
            cursor: pointer;
            margin-bottom: 15px;
            display: inline-block;
            transition: 0.2s ease;
            border: none;
            padding: 0;
        }

        .small-link:hover {
            opacity: 1;
            color: #8c1a1a;
            text-decoration: underline;
        }

        /* Typewriter definition area */
        #definition {
            font-size: 1.2rem;
            opacity: 0.95;
            min-height: 40px;
            margin-top: 5px;
            white-space: pre-wrap;
        }

        /* Flash animation for each letter */
        .flash {
            animation: flash 0.15s ease;
        }

        @keyframes flash {
            0% { color: #000; }
            50% { color: #c0392b; }
            100% { color: #3b2f2f; }
        }

        /* Cursor styling */
        .cursor {
            display: inline-block;
            width: 8px;
            margin-left: 2px;
            animation: blink 0.6s infinite;
        }

        @keyframes blink {
            0% { opacity: 1; }
            50% { opacity: 0; }
            100% { opacity: 1; }
        }
    </style>
</head>

<body>

    <div class="page">

        <!-- Honey Doll link at the TOP -->
        <a class="small-link" 
           href="https://honeyidoll.github.io/OTHER-REPOSITORY" 
           target="_blank">
            Honey Doll
        </a>

        <h1>Compendium</h1>

        <!-- Typewriter definition -->
        <div id="definition"></div>

        <a href="library.html">Enter</a>

    </div>

    <!-- Typewriter Script -->
    <script>
        const text = "An archive of readings, articles, reviews, or critics of a wide variety of topics.";
        let index = 0;

        function typeWriter() {
            const def = document.getElementById("definition");

            // Remove old cursor if present
            const oldCursor = document.querySelector(".cursor");
            if (oldCursor) oldCursor.remove();

            if (index < text.length) {
                const span = document.createElement("span");
                span.textContent = text.charAt(index);
                span.classList.add("flash");
                def.appendChild(span);

                const cursor = document.createElement("span");
                cursor.classList.add("cursor");
                cursor.textContent = "|";
                def.appendChild(cursor);

                index++;
                setTimeout(typeWriter, 45);
            }
        }

        window.onload = typeWriter;
    </script>

</body>
</html>
